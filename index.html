<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Reports &amp; Memos Repository &mdash; Viewforth</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>

:root{
  --bg:#f7f5ef; --card:#fbfaf5; --card-hover:#f0ede3; --paper:#ffffff;
  --border:#e8e3d4; --rule:#e8e3d4; --rule-bd:#cfc8b4;
  --text:#333333; --text-dim:#6b6b6b; --text-bright:#1a1a1a;
  --green:#2e7d32; --green-dim:#e8f5e9; --green-bd:#7fb285;
  --red:#c62828; --red-dim:#ffebee; --red-bd:#e08585; --red-fail:#c62828;
  --amber:#8d6e00; --amber-dim:#fff8e1; --amber-bd:#d7b85a;
  --blue:#1565c0; --blue-dim:#e3f2fd; --purple:#7955bf;
  --font:'Aptos','Segoe UI',system-ui,-apple-system,sans-serif;
  --ig:#eef6e4; --ig-bd:rgba(46,125,50,0.45);
  --tri:#fdf1d6; --tri-bd:rgba(141,110,0,0.45);
  --esa:#e4f0fa; --esa-bd:rgba(21,101,192,0.45);
  --dd:#ece2f6; --dd-bd:rgba(121,85,191,0.45);
  --any:#efe7d4; --any-bd:rgba(116,66,16,0.45);
  --info:#efe9d8; --info-bd:rgba(120,100,70,0.45);
  --aj:#ece8da; --aj-bd:rgba(120,100,70,0.45);
  --rat:#e0ecd9; --rat-bd:rgba(39,103,73,0.45);
  --st-pub:#e8f5e9; --st-partial:#fff9d6;
  --ROWH:31px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:13px;line-height:1.4;overflow-x:hidden}
.shell{padding:14px 18px 28px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
  flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:10px}
.head h1{margin:0;font-size:18px;font-weight:600;color:var(--text-bright)}
.head .sub{margin:3px 0 0;font-size:11px;color:var(--text-dim)}
.stats{display:flex;gap:20px}
.stat-l{color:var(--text-dim);font-size:9px;text-transform:uppercase;letter-spacing:0.5px}
.stat-v{font-weight:700;color:var(--text-bright);font-size:15px}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
input.filter{padding:6px 10px;border:1px solid var(--border);background:var(--paper);
  border-radius:5px;font-size:12px;width:260px;font-family:var(--font)}
input.filter:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px var(--green-dim)}
button.tog{padding:6px 12px;border:1px solid var(--border);background:var(--paper);
  border-radius:5px;font-size:11.5px;cursor:pointer;color:var(--text-dim);font-family:var(--font)}
button.tog:hover{background:var(--card-hover);color:var(--text-bright)}
button.tog.active{background:var(--green);color:#fff;border-color:var(--green)}
.controls .spacer{margin-left:auto;font-size:10.5px;color:var(--text-dim)}
.wrap{overflow:auto;max-height:calc(100vh - 150px);border:1px solid var(--border);
  background:var(--paper);border-radius:6px;position:relative}
table{border-collapse:collapse;width:100%;table-layout:fixed;font-size:11px}
thead{background:#f0ede3}

/* HEADER ROWS */
thead th{position:sticky;background:#f0ede3;color:var(--text-dim);font-weight:600;
  padding:3px 4px;border:1px solid var(--border);text-align:center;line-height:1.15;
  font-size:10px;vertical-align:middle;overflow:visible}
thead tr.master th{top:0;z-index:9;background:#e8e2cd;font-size:11px;text-transform:uppercase;
  letter-spacing:0.6px;color:var(--text-bright);font-weight:800;padding:6px 4px;height:26px;
  box-shadow:0 0 0 1px #e8e2cd}
thead tr.stage th{top:28px;z-index:8;font-size:9px;font-weight:700;letter-spacing:0.3px;
  text-transform:uppercase;padding:3px;height:20px;color:var(--text-dim);
  box-shadow:0 0 0 1px #f0ede3}
thead tr.col th{top:50px;z-index:8;font-size:9px;font-weight:600;background:#faf8f1;padding:0;
  vertical-align:middle;box-shadow:0 0 0 1px #faf8f1}
thead tr.stage th{vertical-align:middle}
thead tr.master th{vertical-align:middle}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{background:#e6e0cc}
thead th.active{background:#dfe8d6;color:var(--text-bright)}
.sort-arrow{font-size:8px;margin-left:2px;color:var(--green)}
.col-meta-h{text-align:left!important;padding:4px 6px!important;font-size:10px;
  text-transform:uppercase;letter-spacing:0.3px;white-space:normal;word-break:break-word;vertical-align:middle}

/* RR paired header — each half is its OWN clickable sort target */
.rr-pair{display:flex;flex-direction:column;line-height:1.1;height:100%}
.rr-pair > .rr-half{flex:1 1 0;min-height:44px;padding:4px 3px;display:flex;flex-direction:column;
  justify-content:center;box-sizing:border-box;cursor:pointer}
.rr-pair > .rr-half:hover{background:#e6e0cc}
.rr-pair > .rr-half.active{background:#dfe8d6}
.rr-pair > .rr-half + .rr-half{border-top:1px dashed var(--rule-bd)}
.rr-pair .num{display:block;font-size:7px;font-weight:600;color:#a8a08c;line-height:1;letter-spacing:0.2px}
.rr-pair .nm{display:block;font-size:8.5px;color:var(--text-bright);font-weight:600;line-height:1.2;
  margin-top:2px;white-space:normal;word-break:break-word;overflow-wrap:anywhere}
.rr-pair .rr-half.blank{cursor:default}
.rr-pair .rr-half.blank:hover{background:none}
.rr-pair .rr-half.blank > *{visibility:hidden}

/* A&J 2x2 header — each quadrant its own sort target */
.aj-titles{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:100%}
.aj-titles > div{padding:4px 2px;min-height:22px;display:flex;flex-direction:column;justify-content:center;
  align-items:center;line-height:1.15;border-right:1px dashed var(--rule-bd);
  border-bottom:1px dashed var(--rule-bd);cursor:pointer}
.aj-titles > div:hover{background:#e6e0cc}
.aj-titles > div.active{background:#dfe8d6}
.aj-titles > div:nth-child(2n){border-right:none}
.aj-titles > div:nth-child(n+3){border-bottom:none}
.aj-titles .num{display:block;font-size:8.5px;font-weight:700;color:var(--text-bright);line-height:1}
.aj-titles .nm{display:block;font-size:6.5px;color:var(--text-dim);font-weight:500;margin-top:1px;
  white-space:normal;word-break:break-word}
.aj-titles > div.blankq{background:#ece8da;cursor:default}
.aj-titles > div.blankq:hover{background:#ece8da}
.aj-titles > div.blankq > *{visibility:hidden}

/* MR 3x2 header — each pillar its own sort target */
.mr-titles{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;height:100%}
.mr-titles > div{padding:3px 3px;display:flex;flex-direction:column;justify-content:center;
  align-items:center;line-height:1.15;border-right:1px dashed var(--rule-bd);
  border-bottom:1px dashed var(--rule-bd);cursor:pointer}
.mr-titles > div:hover{background:#e6e0cc}
.mr-titles > div.active{background:#dfe8d6}
.mr-titles > div:nth-child(3n){border-right:none}
.mr-titles > div:nth-child(n+4){border-bottom:none}
.mr-titles .nm{display:block;font-size:7px;color:var(--text-bright);font-weight:600;
  line-height:1.15;text-align:center;white-space:normal;word-break:break-word}

/* BODY — consistent row heights via fixed-height halves */
tbody td{border:1px solid var(--border);padding:0;vertical-align:middle;
  font-size:11px;height:var(--ROWH)}
tbody tr{height:var(--ROWH)}
tbody tr.stock-hover td{background:#fff7d8!important}
/* alternating per-stock shading — odd stocks slightly darker across ALL cells */
/* alternating per-stock shade on the ROW — every td inherits via transparency */
tbody tr.stock-odd{background:#faf8f2}
tbody tr.stock-even{background:#ffffff}
/* every body td is transparent so the row shade shows through uniformly
   (RR, A&J, MR, INFO all behave identically) */
tbody tr.stock-odd td,tbody tr.stock-even td{background:transparent}
/* state washes still win — applied directly on the cell */
tbody td.fst-pub{background:var(--st-pub)!important}
tbody td.fst-partial{background:var(--st-partial)!important}
/* between-stock divider: the .bot row of each stock gets a strong bottom border */
tbody tr.bot td{border-bottom:2.5px solid #bdb6a0}
/* within-stock divider: lighter line between a stock's own two rows */
tbody tr.top td{border-bottom:1px solid #ece7d8}
tbody td.padcell{padding:3px 4px}
tbody td.padcell-l{padding:4px 6px}

/* stage tints + closed group wraps */
.stg-ig{background:var(--ig)!important}
.stg-tri{background:var(--tri)!important}
.stg-esa{background:var(--esa)!important}
.stg-dd{background:var(--dd)!important}
.stg-any{background:var(--any)!important}
.stg-info{background:var(--info)!important}
.stg-aj{background:var(--aj)!important}
.stg-rat{background:var(--rat)!important}
.bx-ig-l{border-left:3px solid var(--ig-bd)!important}.bx-ig-r{border-right:3px solid var(--ig-bd)!important}.bx-ig-t{border-top:3px solid var(--ig-bd)!important}.bx-ig-b{border-bottom:3px solid var(--ig-bd)!important}
.bx-tri-l{border-left:3px solid var(--tri-bd)!important}.bx-tri-r{border-right:3px solid var(--tri-bd)!important}.bx-tri-t{border-top:3px solid var(--tri-bd)!important}.bx-tri-b{border-bottom:3px solid var(--tri-bd)!important}
.bx-esa-l{border-left:3px solid var(--esa-bd)!important}.bx-esa-r{border-right:3px solid var(--esa-bd)!important}.bx-esa-t{border-top:3px solid var(--esa-bd)!important}.bx-esa-b{border-bottom:3px solid var(--esa-bd)!important}
.bx-dd-l{border-left:3px solid var(--dd-bd)!important}.bx-dd-r{border-right:3px solid var(--dd-bd)!important}.bx-dd-t{border-top:3px solid var(--dd-bd)!important}.bx-dd-b{border-bottom:3px solid var(--dd-bd)!important}
.bx-any-l{border-left:3px solid var(--any-bd)!important}.bx-any-r{border-right:3px solid var(--any-bd)!important}.bx-any-t{border-top:3px solid var(--any-bd)!important}.bx-any-b{border-bottom:3px solid var(--any-bd)!important}
.bx-info-l{border-left:3px solid var(--info-bd)!important}.bx-info-r{border-right:3px solid var(--info-bd)!important}.bx-info-t{border-top:3px solid var(--info-bd)!important}.bx-info-b{border-bottom:3px solid var(--info-bd)!important}
.bx-aj-l{border-left:3px solid var(--aj-bd)!important}.bx-aj-r{border-right:3px solid var(--aj-bd)!important}.bx-aj-t{border-top:3px solid var(--aj-bd)!important}.bx-aj-b{border-bottom:3px solid var(--aj-bd)!important}
.bx-rat-l{border-left:3px solid var(--rat-bd)!important}.bx-rat-r{border-right:3px solid var(--rat-bd)!important}.bx-rat-t{border-top:3px solid var(--rat-bd)!important}.bx-rat-b{border-bottom:3px solid var(--rat-bd)!important}

.bx-rr-umbrella{border-top:3px solid var(--rule-bd)!important;
  border-left:3px solid var(--rule-bd)!important;border-right:3px solid var(--rule-bd)!important}

/* report cell — fixed height, one per row-half */
.rcell{text-align:center;padding:3px 3px;position:relative;line-height:1.15;cursor:default;
  height:var(--ROWH);overflow:hidden}
.rcell .state-lbl{display:block;font-size:8.5px;font-weight:600;color:var(--text-bright);line-height:1.1}
.rcell .cell-sub{display:block;font-size:7px;color:var(--text-dim);line-height:1;margin-top:1px}
.rcell .cell-date{display:block;font-size:7px;color:#9a9380;line-height:1;margin-top:1px}
.aj-rowhalf > div .cell-date{display:block;font-size:6.5px;color:#9a9380;line-height:1;margin-top:1px}
.rcell .audit-pill{display:inline-block;font-size:7px;padding:0 3px;border-radius:2px;
  margin-left:2px;font-weight:700;vertical-align:middle}
.rcell .pp{background:#cce6cc;color:#1c5f1c}
.rcell .pw{background:#ffe9b0;color:#7a5500}
.rcell .pf{background:#ffd0d0;color:#a01515}
.rcell.clickable{cursor:pointer}
.rcell.clickable:hover{filter:brightness(0.97)}
.fst-pub{background:var(--st-pub)!important}
.fst-partial{background:var(--st-partial)!important}
.fst-missing{background:transparent!important}
.rcell-empty{color:#cbc4b3}
.rcell-blank{background:transparent!important;color:transparent}
.au-pass{box-shadow:inset 0 0 0 2px var(--green-bd)}
.au-warn{box-shadow:inset 0 0 0 2px var(--amber-bd)}
.au-fail{box-shadow:inset 0 0 0 2px var(--red-fail);outline:2px dashed var(--red-fail);outline-offset:-2px}

/* meta columns */
.col-co{text-align:left;font-weight:600;color:var(--text-bright);font-size:11px;line-height:1.2;
  padding:3px 6px}
.col-co .nm{display:block}
.col-co .tk{display:block;font-size:8.5px;color:var(--text-dim);font-family:Menlo,Consolas,monospace;
  font-weight:500;margin-top:1px}
.col-indsec{text-align:left;font-size:9px;color:var(--text-dim);line-height:1.25;padding:3px 5px}
.col-indsec .ind{display:block;font-weight:600;color:var(--text-bright)}
.col-indsec .sec{display:block;color:var(--text-dim);font-size:8.5px;margin-top:1px}
.col-stg{text-align:center;padding:3px 4px;white-space:nowrap}
.col-coh{padding:3px 5px;font-size:9px;line-height:1.25;color:var(--text-dim)}
.col-coh .cnm{display:block;font-weight:600;color:var(--text-bright);font-size:9.5px;margin-bottom:1px}
.col-coh .cmb{display:block;color:var(--text-dim);font-size:8px;line-height:1.2}
.col-coh .empty{color:#bcb6a3}
.stage-pill{display:inline-block;padding:1px 8px;border-radius:9px;font-size:9px;font-weight:700;
  letter-spacing:0.3px;text-transform:uppercase}
.sb-ig{background:var(--ig);color:#2d5e1f}
.sb-triaging{background:var(--tri);color:#7a5e00}
.sb-esa{background:var(--esa);color:#0a4080}
.sb-dd{background:var(--dd);color:#4a2e80}
.sb-any{background:#e8e3d4;color:#6b6b6b}
.sb-none{background:#eee;color:#9a9485}

/* A&J body cells — now split: ONE cell per row-half (no rowspan). 2 quadrants each. */
.aj-cell{padding:0;height:var(--ROWH)}
.aj-rowhalf{display:grid;grid-template-columns:1fr 1fr;height:100%;background:transparent}
.aj-rowhalf > div{background:transparent;padding:2px 2px;text-align:center;font-size:9px;
  line-height:1.1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  border-right:1px solid var(--border)}
.aj-rowhalf > div:last-child{border-right:none}
.aj-rowhalf > div .state-lbl{display:block;font-size:8px;color:var(--text-bright);font-weight:600;line-height:1.1}
.aj-rowhalf > div .cell-sub{display:block;font-size:7px;color:var(--text-dim);margin-top:1px}
.aj-rowhalf > div .lbl{display:block;font-size:6.5px;color:var(--text-dim);font-weight:600;
  letter-spacing:0.2px;margin-top:1px;text-transform:uppercase}
.aj-rowhalf > div.au-pass{box-shadow:inset 0 0 0 2px var(--green-bd)}
.aj-rowhalf > div.au-warn{box-shadow:inset 0 0 0 2px var(--amber-bd)}
.aj-rowhalf > div.blankq{background:transparent}
.aj-rowhalf > div.blankq > *{visibility:hidden}
.aj-rowhalf > div.clickable{cursor:pointer}
.aj-rowhalf > div.clickable:hover{filter:brightness(0.96)}

/* MR body cells — split: ONE cell per row-half, 3 pillars each */
.mr-cell{padding:0;height:var(--ROWH)}
.mr-rowhalf{display:grid;grid-template-columns:repeat(3,1fr);height:100%;background:transparent}
.mr-rowhalf > div{background:transparent;padding:2px;display:flex;align-items:center;
  justify-content:center;border-right:1px solid var(--border)}
.mr-rowhalf > div:last-child{border-right:none}
.cov-rb{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;
  border-radius:2px;font-size:8.5px;font-weight:700}
.cov-rb-a{background:#1b5e20;color:#a5d6a7}.cov-rb-b{background:#2e7d32;color:#c8e6c9}
.cov-rb-c{background:#8d6e00;color:#f2e1a5}.cov-rb-d{background:#e65100;color:#f2e1a5}
.cov-rb-e{background:#c62828;color:#e3b3b3}.cov-rb-f{background:#b71c1c;color:#ef9a9a}
.cov-rb-blank{background:#e8e3d4;color:#9a9380}

/* hover popover */
.qc-pop{position:fixed;display:none;z-index:60;background:#fffef8;border:1px solid var(--border);
  border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,0.16);padding:9px 11px;font-size:10.5px;
  line-height:1.45;color:var(--text);min-width:230px;max-width:320px;pointer-events:none}
.qc-pop.show{display:block}
.qc-pop .qc-title{font-weight:700;font-size:11px;border-bottom:1px solid var(--border);
  padding-bottom:3px;margin-bottom:4px;color:var(--text-bright)}
.qc-pop .qc-row{display:flex;justify-content:space-between;gap:12px;padding:1px 0}
.qc-pop .qc-row .k{color:var(--text-dim);font-size:9.5px}
.qc-pop .qc-row .v{font-weight:500;font-size:9.5px;text-align:right}
.no-rows{padding:30px;text-align:center;color:var(--text-dim);font-size:12px}
.foot{margin-top:8px;font-size:9.5px;color:var(--text-dim);text-align:right}

</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div>
      <h1>Reports &amp; Memos Repository</h1>
      <div class="sub">Long-form reading layer for Research Reports &amp; Investment Analyst memos &middot; 103 tickers tracked &middot; functional build, real data</div>
    </div>
    <div class="stats">
      <div><div class="stat-l">Tickers</div><div class="stat-v">103</div></div>
      <div><div class="stat-l">Reports</div><div class="stat-v">473</div></div>
      <div><div class="stat-l">Memos</div><div class="stat-v">15</div></div>
      <div><div class="stat-l">In cohorts</div><div class="stat-v">22</div></div>
    </div>
  </div>
  <div class="controls">
    <input class="filter" id="filterInput" placeholder="Filter by company, ticker, industry, cohort...">
    <button class="tog" id="togEmpty">Hide empty rows</button>
    <span class="spacer">Click any column header to sort &middot; hover a report cell for QC detail</span>
  </div>
  <div class="wrap"><table id="repoTable"><colgroup>
    <col style="width:11%"><col style="width:9.5%"><col style="width:4.5%"><col style="width:10%">
    <col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%"><col style="width:2.7%">
    <col style="width:5.2%"><col style="width:5.2%"><col style="width:5.2%">
    <col style="width:13.2%">
  </colgroup>
  <thead id="repoHead"></thead>
  <tbody id="repoBody"></tbody>
  </table></div>
  <div class="foot" id="repoFoot"></div>
</div>
<div id="qcPop" class="qc-pop" role="tooltip"></div>

function rrCell(r, stg, qn, firstInBlock, lastInBlock){
  var bx = "";

  if(lastInBlock)  bx += " bx-"+stg+"-r";

  var si = stateInfo(q.st), au = auditClass(q.no, q.st);
  var pill = "";
  if(au==="au-pass") pill = '<span class="audit-pill pp">P</span>';
  else if(au==="au-warn") pill = '<span class="audit-pill pw">W</span>';
  else if(au==="au-fail") pill = '<span class="audit-pill pf">F</span>';
  var cls = "rcell "+si.fst+" "+au+bx;
  if(q.st!=="missing") cls += " clickable";
  var qc = JSON.stringify({rr:"RR"+qn, name:q.nm||QNAMES[qn]||"", status:si.lbl,
    source:q.src||"\u2014", words:q.wc, notion:q.no?"yes":"no", date:q.date||"", phase:q.phase||""});
  var inner = '<span class="state-lbl">'+si.short+'</span>';
  if(q.st!=="missing"){
    inner += '<span class="cell-sub">'+(q.src||"")+pill+'</span>';
    if(q.date) inner += '<span class="cell-date">'+fmtDate(q.date)+'</span>';
  }
  return '<td class="'+cls.trim()+'" data-qc=\''+qc.replace(/'/g,"&#39;")+'\'>'+inner+'</td>';
}

    }
    else if(sortField.indexOf("d:")===0 || sortField.indexOf("h:")===0){
      // debrief/hotwash — no data source yet; sort is a stable no-op (all 0)
      av=0; bv=0;
    }
    else if(sortField.indexOf("r:")===0){
      // master rating pillar — no data yet; stable no-op
      av=0; bv=0;
    }

    top += '<td class="col-stg" rowspan="2">'+sp+'</td>';
    if(r.coh){
      top += '<td class="col-coh bx-info-r" rowspan="2"><span class="cnm">'+esc(r.coh)+'</span><span class="cmb">'+esc((r.cohm||[]).join(", "))+'</span></td>';
    } else {
      top += '<td class="col-coh bx-info-r" rowspan="2"><span class="empty">\u2014</span></td>';
    }
    RR_PAIRS.forEach(function(p,i){
      var stg=p[0], fb=(i===0)||RR_PAIRS[i-1][0]!==stg, lb=(i===RR_PAIRS.length-1)||RR_PAIRS[i+1][0]!==stg;
      top += rrCell(r, stg, p[1], fb, lb);
    });
    top += ajCell(r,"m","top") + ajCell(r,"d","top") + ajCell(r,"h","top") + mrCell(r,"top");
    top += '</tr>';
    // BOT row: 13 RR-bot + Memos-bot + Debrief-bot + Hotwash-bot + MR-bot
    var bot = '<tr class="bot '+stockCls+'">';
    RR_PAIRS.forEach(function(p,i){
      var stg=p[0], fb=(i===0)||RR_PAIRS[i-1][0]!==stg, lb=(i===RR_PAIRS.length-1)||RR_PAIRS[i+1][0]!==stg;
      bot += rrCell(r, stg, p[2], fb, lb);
    });
    bot += ajCell(r,"m","bot") + ajCell(r,"d","bot") + ajCell(r,"h","bot") + mrCell(r,"bot");
    bot += '</tr>';
    body += top + bot;
  });
  document.getElementById("repoBody").innerHTML = body;
  document.getElementById("repoFoot").textContent = list.length+" of "+DATA.length+" tickers shown";
  hookPopover();
  hookStockHover();
}

// ---------- SORT / FILTER / TOGGLES ----------
function setSort(f){
  if(sortField===f) sortAsc=!sortAsc;
  else {
    sortField=f;
    // text columns asc (A->Z); report/score columns desc (most complete first)
    sortAsc = (f==="company"||f==="ticker"||f==="sector"||f==="cohort"||f==="stage");
  }
  buildHead(); renderBody();
}
document.getElementById("filterInput").addEventListener("input", function(e){
  filterText=(e.target.value||"").toLowerCase(); renderBody();
});
document.getElementById("togEmpty").addEventListener("click", function(){
  hideEmpty=!hideEmpty;
  this.textContent = hideEmpty?"Show empty rows":"Hide empty rows";
  this.classList.toggle("active", hideEmpty);
  renderBody();
});

// ---------- POPOVER ----------
var pop = document.getElementById("qcPop");
function fieldRow(k,v){ return '<div class="qc-row"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }
function showPop(el, ev){
  var raw=el.getAttribute("data-qc"); if(!raw) return;
  var d; try{ d=JSON.parse(raw); }catch(e){ return; }
  var html='<div class="qc-title">'+(d.rr||"")+(d.name?' &middot; '+d.name:"")+'</div>';
  if(d.status) html+=fieldRow("Status", d.status);
  if(d.source) html+=fieldRow("Source", d.source);
  if(typeof d.words!=="undefined" && d.words) html+=fieldRow("Word count", d.words.toLocaleString());
  if(d.notion) html+=fieldRow("Notion posted", d.notion);
  if(d.date) html+=fieldRow("Date", fmtDate(d.date));
  if(d.phase) html+=fieldRow("Lifecycle phase", d.phase);
  pop.innerHTML=html; pop.classList.add("show");
  var x=ev.clientX+14,y=ev.clientY+14,pw=pop.offsetWidth,ph=pop.offsetHeight;
  if(x+pw>window.innerWidth-8) x=ev.clientX-pw-14;
  if(y+ph>window.innerHeight-8) y=ev.clientY-ph-14;
  pop.style.left=x+"px"; pop.style.top=y+"px";
}
function hidePop(){ pop.classList.remove("show"); }
function hookStockHover(){
  var rows = document.querySelectorAll("#repoBody tr.top, #repoBody tr.bot");
  for(var i=0;i<rows.length;i+=2){
    var a=rows[i], b=rows[i+1];
    (function(a,b){
      function on(){ a.classList.add("stock-hover"); if(b) b.classList.add("stock-hover"); }
      function off(){ a.classList.remove("stock-hover"); if(b) b.classList.remove("stock-hover"); }
      a.addEventListener("mouseenter",on); a.addEventListener("mouseleave",off);
      if(b){ b.addEventListener("mouseenter",on); b.addEventListener("mouseleave",off); }
    })(a,b);
  }
}
function hookPopover(){
  document.querySelectorAll("#repoBody [data-qc]").forEach(function(el){
    el.addEventListener("mouseenter", function(ev){ showPop(el,ev); });
    el.addEventListener("mousemove", function(ev){ if(pop.classList.contains("show")) showPop(el,ev); });
    el.addEventListener("mouseleave", hidePop);
  });
}
document.addEventListener("keydown", function(e){ if(e.key==="Escape") hidePop(); });
document.querySelector(".wrap").addEventListener("scroll", hidePop);

buildHead();
renderBody();
</script>
</body>
